<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Radio Selection</title>
    <link rel="stylesheet" href="radio.css">
</head>
<body>

    <div class="card">
        <div class="card-header">
            <h2>Select your option</h2>
        </div>
        <div class="options-container">
            <label class="radio-option">
                <input type="radio" name="user-type" value="gamer" checked>
                <span class="custom-radio"></span>
                <span class="label-text">Gamer</span>
            </label>

            <label class="radio-option">
                <input type="radio" name="user-type" value="youtuber">
                <span class="custom-radio"></span>
                <span class="label-text">YouTuber</span>
            </label>

            <label class="radio-option">
                <input type="radio" name="user-type" value="student">
                <span class="custom-radio"></span>
                <span class="label-text">Student</span>
            </label>

            <label class="radio-option">
                <input type="radio" name="user-type" value="developer">
                <span class="custom-radio"></span>
                <span class="label-text">Developer</span>
            </label>
        </div>
    </div>

</body>
</html>
